<script>
(() => {
  const grid = document.getElementById("decor-grid");
  if (!grid) return;
  const files = [];
  for (let i = 1; i <= 50; i++) files.push(`/images/bbp/plaster/yw_plaster_${i}_co.png`);
  files.forEach((src, index) => {
    const card = document.createElement("article");
    card.className = "bbp-swatch-card";
    card.innerHTML = `<span class="bbp-swatch-num">№${index + 1}</span><div class="bbp-swatch"><img src="${src}" alt="Штукатурка №${index + 1}" loading="lazy" data-zoomable="true"></div>`;
    grid.appendChild(card);
  });
})();
</script>
<div class="img-modal" id="img-modal" aria-hidden="true">
  <button class="img-modal__close" id="img-modal-close" aria-label="Закрыть">×</button>
  <img class="img-modal__image" id="img-modal-image" alt="">
</div>
<script>
(() => {
  const modal = document.getElementById("img-modal");
  const modalImage = document.getElementById("img-modal-image");
  const closeBtn = document.getElementById("img-modal-close");

  function bindZoom() {
    const zoomables = document.querySelectorAll("img[data-zoomable='true']");
    if (!modal || !modalImage || !closeBtn || !zoomables.length) return;

    function closeModal() {
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
      modalImage.src = "";
    }

    zoomables.forEach((img) => {
      img.classList.add("zoomable-img");
      img.addEventListener("click", () => {
        modalImage.src = img.src;
        modalImage.alt = img.alt || "";
        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden", "false");
      });
    });

    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });
  }

  bindZoom();
})();
</script>
<script src="/site.js"></script>
</body>
</html>
