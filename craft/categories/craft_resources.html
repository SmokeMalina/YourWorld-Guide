  <script>
  (function () {
    const list = document.getElementById("resource-list");
    const input = document.getElementById("resource-search");
    const empty = document.getElementById("resource-empty");
    if (!list || !input || !empty) return;

    const excluded = new Set([
      "ткань immortal",
      "бронепластина immortal",
      "порох",
      "набор деталей экзоскелета"
    ]);
    const manualCosts = window.RESOURCE_COSTS || {};
    let cards = [];

    function normalize(value) {
      return (value || "").toLowerCase().trim();
    }

    function makeCard(icon, name, count, recycleBase) {
      const card = document.createElement("div");
      card.className = "resource-craft-item";
      card.dataset.search = normalize(name) + " " + normalize(count) + " " + normalize(recycleBase);

      card.innerHTML =
        '<div class="resource-craft-item__main">' +
          '<img src="' + icon + '" alt="' + name + '">' +
          '<span>' + name + "</span>" +
        "</div>" +
        '<div class="resource-craft-item__price">' +
          '<div class="resource-craft-item__value">' +
            '<img src="/images/items/scrap.png" alt="Скрап">' +
            '<b>' + count + "</b>" +
          "</div>" +
        "</div>";

      return card;
    }

    function applyFilter() {
      const q = normalize(input.value);
      let visible = 0;

      cards.forEach((card) => {
        const match = !q || card.dataset.search.includes(q);
        card.style.display = match ? "" : "none";
        if (match) visible += 1;
      });

      empty.classList.toggle("hidden", visible > 0);
    }

    fetch("/recycler/index.html")
      .then((res) => res.text())
      .then((html) => {
        const doc = new DOMParser().parseFromString(html, "text/html");
        const rows = Array.from(doc.querySelectorAll(".recycle-card"));

        rows.forEach((row) => {
          const itemImg = row.querySelector(".recycle-side img");
          const itemName = row.querySelector(".recycle-label span");
          const itemCount = row.querySelector(".recycle-count");
          if (!itemImg || !itemName || !itemCount) return;

          const name = itemName.textContent.trim();
          if (excluded.has(normalize(name))) return;

          const recycleCount = itemCount.textContent.trim();
          const numeric = parseInt(recycleCount.replace(/[^\d]/g, ""), 10);
          const manual = manualCosts[name];
          const craftCountNumber = Number.isFinite(manual)
            ? manual
            : (Number.isNaN(numeric) ? null : numeric);
          const craftCount = craftCountNumber === null ? recycleCount : ("x" + String(craftCountNumber));

          const card = makeCard(itemImg.getAttribute("src"), name, craftCount, recycleCount);
          list.appendChild(card);
          cards.push(card);
        });

        applyFilter();
      })
      .catch(() => {
        empty.textContent = "Не удалось загрузить список ресурсов";
        empty.classList.remove("hidden");
      });

    input.addEventListener("input", applyFilter);
  })();
  </script>
